name: Generate resources documentation

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/generate-resources.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate docs/resources.md
        run: python3 scripts/generate_resources.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/resources.md kits.json
          if git diff --staged --quiet; then
            echo "No changes to docs/resources.md or kits.json"
            exit 0
          fi
          git commit -m "chore: regenerate docs/resources.md and kits.json [skip ci]"
          git push
